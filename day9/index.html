<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- <link rel="stylesheet" href="style.css"> -->


</head>
<body>


<!-- RIGHT PANEL -->
<div class="right-panel">
  
  <div class="form-card">

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab-btn active" role="tab" onclick="switchTab('login', this)">Sign In</button>
      <button class="tab-btn" role="tab" onclick="switchTab('signup', this)">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="form-pane active" id="login">
      <h2 class="form-heading">Good to see<br>you again.</h2>
      <p class="form-subheading">Enter your credentials to continue.</p>

      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
        <small class="error" id="error-login-email"></small>
      </div>

      <div class="field">
        <label for="login-pw">Password</label>
        <div class="password-wrapper">
          <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-pw" type="button" onclick="togglePw('login-pw', this)">Show</button>
                  <small class="error" id="error-login-pw"></small>
        </div>


      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <button class="submit-btn" type="button" onclick="handleLogin()">Sign In </button>

    </div>

    <!-- SIGNUP -->
    <div class="form-pane" id="signup">
      <h2 class="form-heading">Begin your<br>story here.</h2>
      <p class="form-subheading">Create a free account in seconds.</p>

      <div class="row-2">
        <div class="field">
          <label for="name">First Name</label>
          <input type="text" id="name" placeholder="Jane" autocomplete="given-name" >
          <small class="error" id="error-name"></small>
        </div>
        <div class="field">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" placeholder="Doe" autocomplete="family-name" >
            <small class="error" id="error-last-name"></small>
        </div>
      </div>

      <div class="field">
        <label for="signup-email">Email</label>
        <small class="error" id="error-signup-email"></small>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" >
      </div>

      <div class="field">
        <label for="signup-pw">Password</label>
        <div class="password-wrapper">
          <input type="password" id="signup-pw" placeholder="At least 8 characters" autocomplete="new-password" >
          <button class="toggle-pw" type="button" onclick="togglePw('signup-pw', this)">Show</button>
            <small class="error" id="error-signup-pw"></small>
        </div>

        <div class="field">
        <label for="signup-pw"> Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="signup-pw" placeholder="At least 8 characters" autocomplete="new-password" >
          <button class="toggle-pw" type="button" onclick="togglePw('signup-pw', this)">Show</button>
            <small class="error" id="error-signup-pw"></small>
        </div>
      </div>

      <button class="submit-btn" type="button" style="margin-top: 0.5rem;" onclick="handleSignup()">Create Account</button>

 

      <p class="terms">By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    </div>

  </div>
</div>

    <script src="script.js"></script>

</body>
</html>
